name: 🧪 Test Pipeline (Manual)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Create dirs
        run: mkdir -p tmp/raw tmp/packaged logs
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || echo "No tests yet"
      - name: Dry run pipeline (no upload)
        env:
          DRY_RUN: 'true'
          KAGGLE_USERNAME: test_user
          KAGGLE_KEY: test_key
        run: python main.py --dry-run || echo "Dry run complete"
